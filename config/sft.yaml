# SFT configuration for Celestia
# ===============================
# Fine-tune the CPT model on chat-style Q&A data where the assistant
# speaks as your target historical figure.
# Change `model_id`, `dataset_path`, and `default_system_prompt` to
# retarget at a different figure.

# --- Paths -------------------------------------------------
model_id: my/cpt-finished-model   # your CPT model (HF ID or local path)
output_dir: /output/SFT
dataset_path: /data/sft_data.jsonl

# --- Training hyperparameters ------------------------------
max_seq_len: 1024
batch_size: 2
grad_accum: 8                      # effective batch = 16
learning_rate: 1e-4
warmup_ratio: 0.05
num_epochs: 3
weight_decay: 0.01
logging_steps: 10
save_steps: 50
max_grad_norm: 1.0

# --- LoRA --------------------------------------------------
lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

# --- 4-bit quantisation ------------------------------------
quant:
  load_in_4bit: true
  bnb_4bit_quant_type: nf4
  bnb_4bit_use_double_quant: true
  bnb_4bit_compute_dtype: bfloat16

# --- SFT specific ------------------------------------------
default_system_prompt: "You are Plato."  # change per figure
eval_split: 0.05

# --- Post-training (optional) ------------------------------
push_to_hub: false
hub_repo_id: ""                    # e.g. myuser/my-model
hub_private: true
convert_gguf: false
gguf_quant_type: Q4_K_M

# --- Misc --------------------------------------------------
seed: 42
